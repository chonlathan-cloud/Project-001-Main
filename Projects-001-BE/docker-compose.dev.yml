services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: project-001-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: project-001
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - project001_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d project-001"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  project001_postgres_data:
